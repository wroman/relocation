<style>

  .note{font-size:13.5px;color:var(--ink2);font-style:italic;margin-top:14px;}

  .panel-h{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
  .panel-h h2{font-family:"Fraunces",serif;font-weight:600;font-size:16px;letter-spacing:.04em;text-transform:uppercase;margin:0;color:var(--ink);}
  .reset{font-family:"Fraunces",serif;font-size:12.5px;letter-spacing:.05em;text-transform:uppercase;background:none;border:1px solid var(--ink2);color:var(--ink2);padding:5px 12px;border-radius:2px;cursor:pointer;transition:.15s;}
  .reset:hover{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  .slider{padding:7px 0;border-bottom:1px dotted var(--line);}

  .tottrack{height:5px;background:var(--paper2);border-radius:3px;margin-top:6px;overflow:hidden;}

  {key:'walkable',     label:'Walkable Core',     ph:'', w:4, pri:false,

  {key:'aesthetics',   label:'Aesthetics',        ph:'', w:4, pri:false,
   tip:'Beauty and upkeep of the built environment — architecture, streetscape, landscaping, design coherence, and the absence of sprawl or blight. Distinct from walkability: a town can have a beautiful built fabric with no walkable core, or a cute Main Street ringed by ugly development. A 5 is a genuinely beautiful, well-kept place.'},
  {key:'outdoors',     label:'Nature',            ph:'', w:4, pri:false,
   tip:'Quality of immediate outdoor access: rolling hills, big vistas, immersive forest, and water. Includes daily walkability of trails, bike infrastructure, and free-range childhood terrain. A score of 5 means wilderness from the back door.'},
  {key:'climate',      label:'Mild Climate',      ph:'', w:2, pri:false,
   tip:'Mildness of the worst season, weighted toward winter severity. A mild four-season climate with no brutal period scores highest. Severe northern winters and brutal Central Texas summers both score low.'},
  {key:'energy',       label:'Energy',            ph:'', w:2, pri:false,
   tip:'Economic dynamism plus cultural depth — is it a growing, entrepreneurial builder or frontier town, with real coffee shops, museums, live music, and a restaurant scene? Includes weighted credit for easy access (within ~30 minutes\' drive) to a much higher-energy hub, so a quiet town next to a vibrant city scores partly for that reach. High = booming and culturally rich, or right next to it; low = static, sleepy, and isolated.'},
  {key:'cost',         label:'Low Cost',          ph:'', w:2, pri:false,
   tip:'General affordability for family and friends to cluster nearby, calibrated to an ~$800K house budget. A score of 5 means the budget goes far and community can follow; a 1 means the town is effectively out of reach for most.'},
  {key:'tax',          label:'Low Taxes',         ph:'', w:2, pri:false,

  {key:'continuity',   label:'Ethnic Stability',  ph:'', w:2, pri:false,

let weights = {...DEFAULT};

function scoreClass(v){ if(v>=4.5)return's5'; if(v>=3.5)return's4'; if(v>=2.5)return's3'; if(v>=1.5)return's2'; return's1'; }
function fmt(v){ return Number.isInteger(v)? v : v.toFixed(1); }

function buildHead(){
  const tr=document.getElementById('head');
  tr.innerHTML='<th class="town">Town</th>'+
    criteria.map(c=>`<th data-tip="${c.tip}">${c.label.replace(' (','<br>(')}</th>`).join('')+
    '<th class="tot">Score</th>';
}
function buildSliders(){
  const box=document.getElementById('sliders');
  box.innerHTML=criteria.map(c=>`
    <div class="slider">
      <div class="lab"><span class="nm ${c.pri?'pri':''}">${c.label}</span><span class="val" id="v-${c.key}">${fmt(weights[c.key])}</span></div>
      <input type="range" min="0" max="5" step="0.5" value="${weights[c.key]}" data-k="${c.key}">
    </div>`).join('');
  box.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('input',e=>{
      const k=e.target.dataset.k; weights[k]=parseFloat(e.target.value);
      document.getElementById('v-'+k).textContent=fmt(weights[k]);
      render();
    });
  });
}
function render(){
  const sumW=Object.values(weights).reduce((a,b)=>a+b,0)||1;
  const max=5*sumW;
  const rows=towns.map(t=>{
    const tot=criteria.reduce((a,c)=>a+t.s[c.key]*weights[c.key],0);
    return {t, tot, pct: max? (tot/max*100):0};
  }).sort((a,b)=>b.tot-a.tot);
  const body=document.getElementById('body');
  body.innerHTML=rows.map((r,i)=>{
    const cells=criteria.map(c=>{
      const v=r.t.s[c.key];
      return `<td><span class="cell ${scoreClass(v)}">${fmt(v)}</span></td>`;
    }).join('');
    return `<tr class="${i===0?'leader':''}">
      <td class="town"><span class="rank">${i+1}</span><span class="nm">${r.t.nm}</span><span class="meta">${r.t.meta}</span></td>
      ${cells}
      <td class="tot"><div class="totbar"><div class="totnum">${r.pct.toFixed(0)}</div><div class="tottrack"><div class="totfill" style="width:${r.pct}%"></div></div></div></td>
    </tr>`;
  }).join('');
}
document.getElementById('reset').addEventListener('click',()=>{
  weights={...DEFAULT};
  document.querySelectorAll('#sliders input').forEach(inp=>{
    inp.value=weights[inp.dataset.k];
    document.getElementById('v-'+inp.dataset.k).textContent=fmt(weights[inp.dataset.k]);
  });
  render();
});
document.getElementById('foot').innerHTML=
  `<b>How to read it.</b> The weighted score (0–100) is each town's scores multiplied by your weights, normalized so 100 = a perfect 5 on every criterion. The table re-sorts live as you drag the sliders, so you can watch the ranking change when, say, you push Christian community up or climate down. `+
  `<b>Caveat.</b> Verify crime at the neighborhood level and visit the churches before weighting too heavily on any single row.`;

buildHead(); buildSliders(); render();

// Tooltip
const tt=document.createElement('div');
tt.className='tt';
document.body.appendChild(tt);
document.addEventListener('mouseover',e=>{
  const th=e.target.closest('th[data-tip]');
  if(th){tt.textContent=th.dataset.tip;tt.classList.add('show');}
});
document.addEventListener('mouseout',e=>{
  if(e.target.closest('th[data-tip]'))tt.classList.remove('show');
});
document.addEventListener('mousemove',e=>{
  tt.style.left=Math.min(e.clientX+16,window.innerWidth-290)+'px';
  tt.style.top=(e.clientY+18)+'px';
});
</script>
</body>
</html>
